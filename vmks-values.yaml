# Шкала нагрузки (ориентир при выборе ресурсов):
#   ~260 VMRule (~5k алертов)     — порог: дефолтные alertmanager/vmalert дают throttling/OOM.
#   ~660 VMRule (~15k алертов)    — vmstorage ~800–870Mi, vmalert ~930m CPU / ~570Mi, operator ~198m CPU.
#   ~1k+ VMRule (~20k+ алертов)   — vmstorage ~1140–1150Mi; vmselect при 1Gi — риск OOM.
#   ~1.2k+ VMRule (~26k+ алертов) — vmselect OOM при лимите 1Gi; operator при 512Mi — OOM.
#   ~1.1k+ VMRule (31k+ алертов)  — /metrics vmalert превышает 16 MiB, нужен promscrape.maxScrapeSize.
# Ниже значения подобраны с запасом до ~2k VMRule (~40k алертов); выше — см. README (шардирование).

grafana:
  ingress:
    ingressClassName: nginx
    enabled: true
    hosts:
      - grafana.apatsev.org.ru

# SLA 99.9 для хранилища метрик: уходим от SPOF `vmsingle` к реплицируемому `VMCluster`.
# Это "настоящая" HA: потеря pod/ноды не равна потере сервиса и данных.
vmsingle:
  enabled: false # было true по умолчанию

vmcluster:
  enabled: true # было false по умолчанию
  spec:
    # Храним каждую точку минимум в 2 копиях на vmstorage.
    replicationFactor: 2

    vmstorage:
      # Минимум 2 реплики, чтобы replicationFactor=2 имел смысл.
      replicaCount: 2
      # При ~1k+ VMRule (~20k+ алертов) потребление ~1140–1150Mi; лимит 1500Mi (дефолт) — мало запаса.
      # 2Gi — запас до ~2k VMRule; при дальнейшем росте — смотреть container_memory_working_set_bytes.
      resources:
        limits:
          memory: 2Gi
        requests:
          memory: 512Mi

    # VMSelect и VMInsert тоже без SPOF: по 2 реплики.
    vmselect:
      replicaCount: 2
      # При большом числе VMRule vmalert шлёт много запросов (restore ALERTS_FOR_STATE + eval).
      # Дефолт maxConcurrentRequests=2 даёт 429 и "couldn't start executing in 10s".
      extraArgs:
        search.maxConcurrentRequests: "16"
        search.maxQueueDuration: "60s"
      # При ~1.3k+ VMRule (~26k+ алертов) vmselect получает десятки тысяч запросов (restore + eval),
      # лимит 1Gi даёт OOMKilled (Exit Code 137). 2Gi — запас до ~2k VMRule и при slow queries.
      resources:
        limits:
          memory: 2Gi
        requests:
          memory: 256Mi
    vminsert:
      replicaCount: 2

  ingress:
    select:
      enabled: true
      ingressClassName: nginx
      hosts:
        - vmselect.apatsev.org.ru

# HA для доставки уведомлений: Alertmanager в кластерном режиме.
# Важно для SLA alerting pipeline: падение 1 pod/ноды не должно останавливать прием алертов.
alertmanager:
  # Нотификации: по умолчанию blackhole; маршрут на Telegram и Mattermost (раскомментировать route.receiver/routes).
  # Секреты (bot_token, webhook URL) — через configSecret в production.
  config:
    route:
      receiver: "blackhole"
      # Отправлять все алерты также в Telegram и Mattermost:
      # receiver: "telegram"
      # routes:
      #   - receiver: mattermost
      #     matchers: ["severity=~warning|critical"]
      group_by: ["alertname", "cluster"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: blackhole
      - name: telegram
        telegram_configs:
          - api_url: https://api.telegram.org
            send_resolved: true
            # В production: создать Secret и указать alertmanager.spec.configSecret
            bot_token: "<BOT_TOKEN>"
            chat_id: "<CHAT_ID>"
            parse_mode: "HTML"
      - name: mattermost
        slack_configs:
          # Mattermost совместим с Slack webhook API
          - send_resolved: true
            # В production: использовать configSecret
            api_url: "https://<MATTERMOST_HOST>/hooks/<WEBHOOK_ID>"
            channel: "#alerts"
            title: '{{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'
  spec:
    replicaCount: 2
    # Защищаемся от добровольных disruption'ов (drain/upgrade) так, чтобы 2 pod оставалось.
    podDisruptionBudget:
      minAvailable: 1

    resources:
      limits:
        # Дефолтные 100m CPU вызывают 100%-й throttling и рестарты при ≥260 VMRule (~5k алертов).
        # 500m/512Mi — запас до ~1k+ правил.
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 256Mi

vmalert:
  spec:
    # HA для оценки правил: 2 реплики, чтобы падение pod/ноды не останавливал оценку.
    # Чтобы НЕ получить двойные нотификации, см. раздел в README: у реплик должны быть одинаковые labels алертов.
    replicaCount: 2
    # Защита от disruption'ов (drain/upgrade): минимум 1 pod должен оставаться.
    podDisruptionBudget:
      minAvailable: 1

    resources:
      limits:
        # 1 CPU — 100%-й throttling при ~260 VMRule (~5k алертов). При ~660 VMRule — ~930m CPU, ~570Mi.
        # 2 CPU / 2Gi — запас до ~2k VMRule (~40k алертов); выше — шардирование (см. README).
        cpu: "2"
        memory: 2Gi
      requests:
        cpu: 1200m
        memory: 2Gi

# VMAgent: при ~1100+ VMRule (31 000+ алертов) эндпоинт /metrics vmalert превышает
# дефолтный maxScrapeSize (16 МБ) — vmagent перестаёт скрейпить vmalert. 128 МБ — до ~2k+ VMRule.
vmagent:
  spec:
    extraArgs:
      promscrape.maxScrapeSize: "134217728"

# VM Operator: при 39 VMRule — ~236m CPU; при ~1.2k+ VMRule растёт пропорционально,
# 512Mi памяти даёт OOM → CrashLoopBackOff. 4Gi — запас до 2k+ VMRule.
victoria-metrics-operator:
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
