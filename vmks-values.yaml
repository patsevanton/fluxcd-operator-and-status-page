grafana:
  ingress:
    ingressClassName: nginx
    enabled: true
    hosts:
      - grafana.apatsev.org.ru

vmsingle:
  enabled: false

vmcluster:
  enabled: true
  spec:
    replicationFactor: 2

    vmstorage:
      replicaCount: 2

    vmselect:
      replicaCount: 2
    vminsert:
      replicaCount: 2

  ingress:
    select:
      enabled: true
      ingressClassName: nginx
      hosts:
        - vmselect.apatsev.org.ru

alertmanager:
  config:
    route:
      receiver: "blackhole"
      group_by: ["alertname", "cluster"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: blackhole
      - name: telegram
        telegram_configs:
          - api_url: https://api.telegram.org
            send_resolved: true
            bot_token: "<BOT_TOKEN>"
            chat_id: "<CHAT_ID>"
            parse_mode: "HTML"
  spec:
    replicaCount: 2
    podDisruptionBudget:
      minAvailable: 1

vmalert:
  spec:
    replicaCount: 2
    podDisruptionBudget:
      minAvailable: 1
