apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goldpinger
  namespace: flux-system
spec:
  interval: 15m
  timeout: 10m
  targetNamespace: goldpinger
  chart:
    spec:
      chart: goldpinger
      version: "1.1.0"
      sourceRef:
        kind: HelmRepository
        name: goldpinger
        namespace: flux-system
      interval: 15m
  releaseName: goldpinger
  values:
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: goldpinger.apatsev.org.ru
          paths:
            - path: /
              pathType: Prefix
