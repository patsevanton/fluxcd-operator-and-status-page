apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmks
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  targetNamespace: vmks
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.74.1"
      sourceRef:
        kind: HelmRepository
        name: vmks
        namespace: flux-system
      interval: 15m
  releaseName: vmks
  values:
    grafana:
      ingress:
        ingressClassName: nginx
        enabled: true
        hosts:
          - grafana.apatsev.org.ru
