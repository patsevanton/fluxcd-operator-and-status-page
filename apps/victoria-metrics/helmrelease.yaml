apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmks
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  targetNamespace: vmks
  # RetryOnFailure: при установке/апгрейде victoria-metrics-k8s-stack возможна гонка —
  # часть ресурсов создаётся до того, как оператор и webhook готовы принимать запросы
  # (например: failed to call webhook "vmagents.operator.victoriametrics.com" —
  # no endpoints available for service "vmks-victoria-metrics-operator"). Flux
  # повторяет helm install/upgrade с интервалом, пока ошибки не исчезнут.
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.74.1"
      sourceRef:
        kind: HelmRepository
        name: vmks
        namespace: flux-system
      interval: 15m
  releaseName: vmks
  values:
    kubeControllerManager:
      enabled: false
    # scheduler control plane вне кластера (managed k8s) — иначе VMServiceScrape без целей и предупреждение vmagent
    kubeScheduler:
      enabled: false
    # etcd не в кластере (managed k8s и т.п.) — scrape даёт 0 targets и предупреждение vmagent
    kubeEtcd:
      enabled: false
    defaultRules:
      groups:
        etcd:
          create: false
        kubeControllerManager:
          create: false
        kubeScheduler:
          create: false
        kubernetesSystemScheduler:
          create: false
    grafana:
      ingress:
        ingressClassName: nginx
        enabled: true
        hosts:
          - grafana.apatsev.org.ru
