apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  targetNamespace: opencost
  chart:
    spec:
      chart: opencost
      version: "2.5.14"
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
      interval: 15m
  releaseName: opencost
  values:
    opencost:
      prometheus:
        internal:
          serviceName: vmsingle-vmks-victoria-metrics-k8s-stack
          namespaceName: vmks
          port: 8428
