apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-rollouts
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  targetNamespace: argo-rollouts
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  chart:
    spec:
      chart: argo-rollouts
      version: "2.40.9"
      sourceRef:
        kind: HelmRepository
        name: argoproj
        namespace: flux-system
      interval: 15m
  releaseName: argo-rollouts
