apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmks
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  # disableWait: true - Flux не ждёт Ready у всех ресурсов после install/upgrade.
  # В первую очередь из‑за первого запуска vmks: долгий cold start (CRD, операторы, StatefulSet),
  # из‑за чего reconciler ловит таймауты, пока всё не поднимется.
  disableWait: true
  targetNamespace: vmks
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.74.1"
      sourceRef:
        kind: HelmRepository
        name: vmks
        namespace: flux-system
      interval: 15m
  releaseName: vmks
  values:
    grafana:
      ingress:
        ingressClassName: nginx
        enabled: true
        hosts:
          - grafana.apatsev.org.ru
