apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  targetNamespace: vector
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  chart:
    spec:
      chart: vector
      version: "0.51.0"
      sourceRef:
        kind: HelmRepository
        name: vector
        namespace: flux-system
      interval: 15m
  releaseName: vector
  values:
    role: Agent
    customConfig:
      data_dir: /vector-data-dir
      api:
        enabled: false
      sources:
        kubernetes_logs:
          type: kubernetes_logs
      sinks:
        blackhole:
          type: blackhole
          inputs:
            - kubernetes_logs
