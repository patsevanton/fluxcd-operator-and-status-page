apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chaos-mesh
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  targetNamespace: chaos-mesh
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  chart:
    spec:
      chart: chaos-mesh
      version: "2.8.2"
      sourceRef:
        kind: HelmRepository
        name: chaos-mesh
        namespace: flux-system
      interval: 15m
  releaseName: chaos-mesh
