# VictoriaLogs (single). HelmRepository `vmks` задаётся в apps/victoria-metrics/sources.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vls
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  targetNamespace: vlogs
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  chart:
    spec:
      chart: victoria-logs-single
      version: "0.12.0"
      sourceRef:
        kind: HelmRepository
        name: vmks
        namespace: flux-system
      interval: 15m
  releaseName: vls
  values:
    server:
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - name: victorialogs.apatsev.org.ru
            path:
              - /
            port: http
