apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  targetNamespace: falco
  chart:
    spec:
      chart: falco
      version: "8.0.2"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
      interval: 15m
  releaseName: falco
