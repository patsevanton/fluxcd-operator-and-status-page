apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: flux-system
spec:
  interval: 15m
  timeout: 15m
  targetNamespace: keda
  install:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  chart:
    spec:
      chart: keda
      version: "2.19.0"
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: flux-system
      interval: 15m
  releaseName: keda
