# Bitnami отключил классический Helm index (403 на charts.bitnami.com).
# Официальная поставка чартов — OCI: registry-1.docker.io/bitnamicharts/<chart>
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: bitnami-nginx
  namespace: flux-system
spec:
  interval: 24h
  url: oci://registry-1.docker.io/bitnamicharts/nginx
