# Намеренно несуществующая версия чарта — HelmRelease остаётся NotReady (демо алертов Flux / vmalert).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: broken-demo
  namespace: broken-demo
spec:
  interval: 5m
  timeout: 5m
  targetNamespace: broken-demo
  chart:
    spec:
      chart: nginx
      version: "999.0.0"
      sourceRef:
        kind: OCIRepository
        name: bitnami-nginx
        namespace: flux-system
      interval: 24h
  releaseName: broken-demo
