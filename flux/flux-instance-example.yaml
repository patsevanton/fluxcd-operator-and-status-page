# Пример FluxInstance для миграции с обычного Flux CD на Flux Operator.
# Подставьте свой Git URL, ref и path (path должен указывать на каталог с kustomization.yaml).
# Документация: https://fluxoperator.dev/docs/instance/sync/
---
apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.7.x"
    registry: "ghcr.io/fluxcd"
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  sync:
    kind: GitRepository
    url: "https://github.com/YOUR_ORG/fluxcd-operator-and-status-page.git"
    ref: "refs/heads/main"
    path: "flux"
    # Для приватного репозитория создайте secret и укажите:
    # pullSecret: "flux-system"
