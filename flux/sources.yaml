# Helm-репозиторий VictoriaMetrics (чарт victoria-metrics-k8s-stack).
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: vm
  namespace: flux-system
spec:
  interval: 24h # если HelmRepository не будет работать, то уменьшить
  url: https://victoriametrics.github.io/helm-charts/
