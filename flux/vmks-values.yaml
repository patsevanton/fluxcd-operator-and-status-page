# Упрощённая конфигурация для малой/нулевой нагрузки: vmsingle, 1 реплика компонентов.

grafana:
  ingress:
    ingressClassName: nginx
    enabled: true
    hosts:
      - grafana.apatsev.org.ru

# Один инстанс — достаточно без нагрузки. VMCluster отключён.
vmsingle:
  enabled: true
  ingress:
    select:
      enabled: true
      ingressClassName: nginx
      hosts:
        - vmselect.apatsev.org.ru

vmcluster:
  enabled: false

alertmanager:
  spec:
    replicaCount: 1

vmalert:
  spec:
    replicaCount: 1

victoria-metrics-operator:
  resources:
    limits:
      memory: 512Mi
    requests:
      memory: 256Mi
