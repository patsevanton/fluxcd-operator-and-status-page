# VictoriaMetrics K8s Stack: метрики, алерты, Grafana (VMCluster, vmalert, vmagent, Alertmanager).
# Values из ConfigMap vmks-values (генерируется Kustomize из ../vmks-values.yaml).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vmks
  namespace: flux-system
spec:
  interval: 15m
  timeout: 10m
  targetNamespace: vmks
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.71.x"
      sourceRef:
        kind: HelmRepository
        name: vmks
        namespace: flux-system
      interval: 5m
  releaseName: vmks
  valuesFrom:
    - kind: ConfigMap
      name: vmks-values
      valuesKey: vmks-values.yaml
      optional: false
